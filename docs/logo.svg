<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="s-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="i-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="400" height="400" rx="40" fill="url(#bg-grad)" />

  <g stroke="#334155" stroke-width="1" opacity="0.4">
    <line x1="40" y1="0" x2="40" y2="400" />
    <line x1="80" y1="0" x2="80" y2="400" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="240" y1="0" x2="240" y2="400" />
    <line x1="280" y1="0" x2="280" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />

    <line x1="0" y1="40" x2="400" y2="40" />
    <line x1="0" y1="80" x2="400" y2="80" />
    <line x1="0" y1="120" x2="400" y2="120" />
    <line x1="0" y1="160" x2="400" y2="160" />
    <line x1="0" y1="200" x2="400" y2="200" />
    <line x1="0" y1="240" x2="400" y2="240" />
    <line x1="0" y1="280" x2="400" y2="280" />
    <line x1="0" y1="320" x2="400" y2="320" />
    <line x1="0" y1="360" x2="400" y2="360" />
  </g>

  <g filter="url(#glow)">
    <line x1="200" y1="240" x2="320" y2="200" stroke="url(#i-grad)" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" />
    <line x1="240" y1="80" x2="320" y2="80" stroke="url(#s-grad)" stroke-width="4" stroke-dasharray="8 8" opacity="0.6" />
    <line x1="80" y1="160" x2="320" y2="200" stroke="url(#s-grad)" stroke-width="4" stroke-dasharray="8 8" opacity="0.4" />

    <path
      d="M 240 80 L 120 80 L 80 120 L 80 160 L 200 240 L 200 280 L 160 320 L 80 320"
      fill="none"
      stroke="url(#s-grad)"
      stroke-width="20"
      stroke-linecap="round"
      stroke-linejoin="round"
    />

    <path
      d="M 320 80 L 320 320"
      fill="none"
      stroke="url(#i-grad)"
      stroke-width="20"
      stroke-linecap="round"
    />

    <circle cx="240" cy="80" r="14" fill="#0f172a" stroke="url(#s-grad)" stroke-width="6" />
    <circle cx="120" cy="80" r="8" fill="url(#s-grad)" />
    <circle cx="80" cy="120" r="8" fill="url(#s-grad)" />
    <circle cx="80" cy="160" r="14" fill="#0f172a" stroke="url(#s-grad)" stroke-width="6" />
    <circle cx="200" cy="240" r="14" fill="#0f172a" stroke="url(#s-grad)" stroke-width="6" />
    <circle cx="200" cy="280" r="8" fill="url(#s-grad)" />
    <circle cx="160" cy="320" r="8" fill="url(#s-grad)" />
    <circle cx="80" cy="320" r="14" fill="#0f172a" stroke="url(#s-grad)" stroke-width="6" />

    <circle cx="320" cy="80" r="14" fill="#0f172a" stroke="url(#i-grad)" stroke-width="6" />
    <circle cx="320" cy="200" r="14" fill="#0f172a" stroke="url(#i-grad)" stroke-width="6" />
    <circle cx="320" cy="320" r="14" fill="#0f172a" stroke="url(#i-grad)" stroke-width="6" />
  </g>
</svg>
